<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHBOARD_TITLE_PLACEHOLDER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard/static/style.css">
    <!--THEME_CSS-->
</head>
<body>
    <div class="scanline"></div>

    <!-- Mission Header -->
    <header class="mission-header">
        <div class="mission-badge">
            <a href="javascript:history.back()" class="back-link" title="Back to Demo App">&#8592; BACK</a>
            <span class="mission-prefix">SCENARIO_NAME_PLACEHOLDER</span>
            <span class="mission-id">NAMESPACE_PLACEHOLDER</span>
        </div>
        <div class="mission-title">DASHBOARD_TITLE_PLACEHOLDER</div>
        <div class="mission-status" id="mission-status">
            <span class="status-dot nominal"></span>
            <span id="overall-status">ALL SYSTEMS NOMINAL</span>
        </div>
    </header>

    <!-- Countdown Clock (hidden by default, shown if scenario has countdown) -->
    <section class="countdown-section" id="countdown-section" style="display:none">
        <div class="countdown-label">COUNTDOWN</div>
        <div class="countdown-clock" id="countdown-clock">T-10:00</div>
        <div class="countdown-controls">
            <button class="ctrl-btn" onclick="countdownAction('start')">START</button>
            <button class="ctrl-btn" onclick="countdownAction('pause')">HOLD</button>
            <button class="ctrl-btn" onclick="countdownAction('reset')">RESET</button>
            <select class="ctrl-select" onchange="setSpeed(this.value)">
                <option value="1">1x</option>
                <option value="2">2x</option>
                <option value="5">5x</option>
                <option value="10">10x</option>
                <option value="30">30x</option>
            </select>
        </div>
    </section>

    <!-- Subsystem Status Grid (populated dynamically from /api/scenario) -->
    <section class="subsystem-grid" id="subsystem-grid"></section>

    <!-- Event Feed -->
    <section class="event-feed">
        <div class="feed-header">EVENT LOG</div>
        <div class="feed-container" id="event-feed"></div>
    </section>

    <script>
        // Scenario metadata injected by server
        window.SCENARIO_NAMESPACE = 'NAMESPACE_PLACEHOLDER';
        window.DEPLOYMENT_ID = 'DEPLOYMENT_ID_PLACEHOLDER';
    </script>
    <script src="/dashboard/static/app.js"></script>
</body>
</html>
