title: 'Elastic Serverless for Exxon: Infrastructure 2.0 Unified Observability'
teaser: Consolidate Datadog, Splunk, OpenNMS, and ThousandEyes into one Elastic
  Serverless platform — 1,500+ applications and 1,000+ Azure services, from
  OTel and Azure Insights to legacy SNMP and end-user experience monitoring.
description: |-
  ## The Challenge

  ExxonMobil instruments more than 1,500 applications and more than 1,000
  Azure services. Azure-based service owners rely on Azure Insights; server
  and container insights come largely from the Datadog Agent; APM agents are
  in use with varying success. The observability landscape is fragmented
  across Datadog, Splunk, OpenNMS, and ThousandEyes with no single view.
  Logging pipelines are not well-defined; SDOs do not consistently leverage
  tags across metrics, logs, monitors, or events. OpenTelemetry is not
  heavily utilized today; Elastic Serverless accepts OTLP natively so any
  OTLP-capable source (including Azure where applicable) can be collected
  in one place. SNMP traps from legacy Cisco infrastructure remain isolated
  from modern APM and logs.

  ## What You Will Build

  In this three-challenge track you will stand up an **Elastic Serverless**
  project and progressively unify every data stream into one platform:

  1. **Unified APM & Logs with OpenTelemetry** — replace the fragmented
     Datadog/Splunk pipeline with native OTel ingest into Elastic Serverless.
  2. **Legacy Network Infrastructure (SNMP)** — ingest Cisco SNMP traps and
     correlate them with ServiceNow CMDB data.
  3. **Single Pane of Glass for End-User Experience** — investigate an
     end-user issue spanning Azure Virtual Desktop, iboss, and AppGate Zero
     Trust using a unified Elastic dashboard.
