slug: elastic-exxon-serverless-observability
version: "3"
title: "Elastic Serverless for Exxon: Infrastructure 2.0 Unified Observability"
teaser: >-
  Consolidate Datadog, Splunk, OpenNMS, and ThousandEyes into one
  Elastic Serverless platform — from OTel-instrumented Azure API services
  and OpenShift Kubernetes all the way to legacy SNMP traps and end-user
  desktop experience monitoring.
description: |
  ## The Challenge

  Exxon's observability landscape is fragmented across four tools — Datadog
  (metrics & APM), Splunk (application logs), OpenNMS (network monitoring),
  and ThousandEyes on Cisco switches — with no single view of how the
  environment affects end users. Log pipelines in Datadog are failing to
  create, 1,000 Azure API service instances produce "messy" APM data that
  nobody knows how to act on, and SNMP traps from legacy Cisco infrastructure
  are isolated from modern OpenShift/Kubernetes metrics.

  ## What You Will Build

  In this three-challenge track you will stand up an **Elastic Serverless**
  project and progressively unify every data stream into one platform:

  1. **Unified APM & Logs with OpenTelemetry** — replace the fragmented
     Datadog/Splunk pipeline with native OTel ingest into Elastic Serverless.
  2. **Legacy Network Infrastructure (SNMP)** — ingest Cisco SNMP traps and
     correlate them with ServiceNow CMDB data.
  3. **Single Pane of Glass for End-User Experience** — investigate an
     end-user issue spanning Azure Virtual Desktop, iboss, and AppGate Zero
     Trust using a unified Elastic dashboard.

  ## Target Audience

  Exxon Infrastructure 2.0 engineering team, pre-sales SEs, and Elastic
  solution architects evaluating Elastic Serverless for consolidated
  observability.

